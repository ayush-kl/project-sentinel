name: Deploy to Vercel

# Ships the Next.js `app` workspace to Vercel.
#   - Pull requests        -> Preview deployment (commented back on the PR)
#   - Pushes to `main`     -> Production deployment
#
# Every deploy is gated on `npm run typecheck && npm run test`, matching the
# pre-commit gate in CLAUDE.md — a red gate never reaches Vercel.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN       Account token        (vercel.com/account/tokens)
#   VERCEL_ORG_ID      Linked org/team id   (from `.vercel/project.json` after `vercel link`)
#   VERCEL_PROJECT_ID  Linked project id    (from `.vercel/project.json` after `vercel link`)
#
# In the Vercel project settings, set the Root Directory to `app` so the linked
# project builds the dashboard workspace.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same ref supersedes an in-flight deploy.
concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  verify:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspaces
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  deploy:
    name: Deploy (${{ github.event_name == 'push' && 'production' || 'preview' }})
    needs: verify
    runs-on: ubuntu-latest
    # PRs from forks can't read secrets; skip the deploy for them rather than fail.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Resolve deploy environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "target=production" >> "$GITHUB_OUTPUT"
            echo "flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "target=preview" >> "$GITHUB_OUTPUT"
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ steps.env.outputs.target }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifacts
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt ${{ steps.env.outputs.flag }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- vercel-preview -->';
            const body = `${marker}\n🔺 **Vercel preview deployed:** ${url}\n\n_Commit ${context.sha.slice(0, 7)} · gated on typecheck + test._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
